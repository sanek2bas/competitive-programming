services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres_container
    ports:
      - 8080:5432
    environment:
      - POSTGRES_DB=
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - dbnet
    volumes:
      - postgres-data:/var/lib/postgresql/data

networks:
  dbnet:
    driver: bridge

volumes:
  postgres-data: